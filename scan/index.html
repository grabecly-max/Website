<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFinance Digital | AI Market Scanner</title>
  
  <!-- FontAwesome for the upload icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Source+Serif+4:wght@700&display=swap');

    /* ---------- VARIABLES ---------- */
    :root {
      --color-bg: #121212;
      --color-primary: #D4AF37; /* Gold */
      --color-text: #E0E0E0;
      --color-card: #1E1E1E;
      --color-border: #333;
      --color-danger: #ff6b6b;
      --color-muted: #888;

      --font-xs: 1.2rem;
      --font-sm: 1.4rem;
      --font-md: 1.6rem;
      --font-lg: 2rem;
      --font-xl: 2.4rem;
    }

    /* ---------- RESET ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 62.5%;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      font-size: var(--font-md);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Background Effects */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top left, rgba(212, 175, 55, 0.05), transparent 40%),
                  radial-gradient(circle at bottom right, rgba(212, 175, 55, 0.05), transparent 40%);
      z-index: -1;
      pointer-events: none;
    }

    /* ---------- LAYOUT ---------- */
    .scanner-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 3rem;
      max-width: 750px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.25);
    }

    h1 {
      font-size: var(--font-xl);
      color: var(--color-primary);
      margin-bottom: 0.5rem;
    }

    p.subtitle {
      font-size: var(--font-sm);
      color: var(--color-muted);
      margin-bottom: 2rem;
    }

    /* ---------- BUTTONS ---------- */
    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      font-family: 'Source Serif 4', serif;
      font-weight: 700;
      text-decoration: none;
      font-size: var(--font-sm);
      border: 2px solid var(--color-primary);
      background: transparent;
      color: var(--color-primary);
      transition: all 0.3s ease;
      cursor: pointer;
      text-align: center;
      min-width: 200px;
    }

    .btn-primary {
      background: var(--color-primary);
      color: #000;
    }

    .btn:hover:not(:disabled) {
      background: var(--color-primary);
      color: #000;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }

    .btn-primary:hover:not(:disabled) {
      background: transparent;
      color: var(--color-primary);
    }

    .btn:disabled {
      background: var(--color-border);
      border-color: var(--color-border);
      color: var(--color-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ---------- UPLOADER ---------- */
    .uploader-container {
      border: 2px dashed var(--color-primary);
      border-radius: 10px;
      padding: 3rem 2rem;
      margin: 1.5rem 0;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(0,0,0,0.2);
    }

    .uploader-container:hover, .uploader-container.dragover {
      background-color: rgba(212, 175, 55, 0.08);
      border-color: #FFF;
    }

    .uploader-container label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .uploader-container i {
      font-size: 3.5rem;
      color: var(--color-primary);
      margin-bottom: 1rem;
    }

    .uploader-container span {
      font-size: var(--font-md);
      color: var(--color-text);
      font-weight: 600;
    }

    .uploader-container small {
      font-size: var(--font-xs);
      color: var(--color-muted);
      margin-top: 0.5rem;
    }

    /* ---------- IMAGE PREVIEW ---------- */
    .preview-container {
      display: none;
      margin: 1.5rem 0;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      overflow: hidden;
      max-height: 45vh;
      position: relative;
    }

    #chart-preview {
      width: 100%;
      object-fit: contain;
      display: block;
      max-height: 45vh;
      background: #000;
    }

    .remove-image-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid var(--color-border);
      border-radius: 50%;
      width: 35px;
      height: 35px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .remove-image-btn:hover {
      background: var(--color-danger);
      border-color: var(--color-danger);
    }

    /* ---------- RESULT AREA ---------- */
    .scanner-result {
      display: none;
      margin-top: 2rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--color-primary);
      border-radius: 10px;
      padding: 2rem;
      text-align: left;
      font-size: var(--font-sm);
      line-height: 1.8;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    /* Keep AI line breaks perfectly formatted */
    .ai-analysis-text {
      white-space: pre-wrap; 
      color: var(--color-text);
    }

    /* ---------- LOADERS ---------- */
    .loader {
      border-radius: 50%;
      border-top: 4px solid var(--color-primary);
      animation: spin 1s linear infinite;
      margin: 0 auto;
      width: 45px;
      height: 45px;
      border: 4px solid var(--color-border);
      border-top: 4px solid var(--color-primary);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 1rem;
      color: var(--color-primary);
      font-weight: 600;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 600px) {
      html { font-size: 55%; }
      .card {
        padding: 2rem 1.5rem;
        border: none;
        background: transparent;
        box-shadow: none;
      }
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="scanner-wrapper">
    <div class="card">
      <h1>AI Market Scanner</h1>
      <p class="subtitle">Upload a Forex or Synthetic market chart for instant AI strategy analysis.</p>
      
      <!-- Upload Box -->
      <div class="uploader-container" id="drop-zone">
        <label for="chart-input">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <span id="upload-text">Click or Drag to Upload Chart</span>
          <small>Supports JPG, PNG, WEBP</small>
        </label>
        <input type="file" id="chart-input" accept="image/*" hidden>
      </div>

      <!-- Preview Box -->
      <div class="preview-container" id="preview-container">
        <button class="remove-image-btn" id="remove-btn" title="Remove Image">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <img id="chart-preview" src="" alt="Chart Preview">
      </div>

      <!-- Controls -->
      <div class="button-group">
        <button class="btn btn-primary" id="scan-btn" onclick="uploadAndScan()" disabled>
          <i class="fa-solid fa-microchip"></i> Scan Chart
        </button>
      </div>

      <!-- Result / Loading Area -->
      <div class="scanner-result" id="result-container">
        <div id="loading-state" style="display: none; text-align: center;">
          <div class="loader"></div>
          <p class="loading-text">AI is analyzing market structure...<br><small style="color: var(--color-muted); font-weight: 400;">Extracting sniper entries & zones</small></p>
        </div>
        
        <div id="ai-response" style="display: none;">
          <h3 style="color: var(--color-primary); margin-bottom: 1rem; text-align: center; font-size: var(--font-lg);">Analysis Complete</h3>
          <div class="ai-analysis-text" id="analysis-text"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const fileInput = document.getElementById('chart-input');
    const dropZone = document.getElementById('drop-zone');
    const previewContainer = document.getElementById('preview-container');
    const chartPreview = document.getElementById('chart-preview');
    const removeBtn = document.getElementById('remove-btn');
    const scanBtn = document.getElementById('scan-btn');
    const resultContainer = document.getElementById('result-container');
    const loadingState = document.getElementById('loading-state');
    const aiResponse = document.getElementById('ai-response');
    const analysisText = document.getElementById('analysis-text');

    let selectedFile = null;

    // --- Drag & Drop Handlers ---
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        handleFileSelection(e.dataTransfer.files[0]);
      }
    });

    // --- Click to Upload Handler ---
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFileSelection(e.target.files[0]);
      }
    });

    // --- Remove Image Handler ---
    removeBtn.addEventListener('click', () => {
      resetUploader();
    });

    function handleFileSelection(file) {
      if (!file.type.startsWith('image/')) {
        alert("Please select a valid image file.");
        return;
      }
      
      selectedFile = file;
      
      // Setup FileReader to show preview
      const reader = new FileReader();
      reader.onload = (e) => {
        chartPreview.src = e.target.result;
        dropZone.style.display = 'none';
        previewContainer.style.display = 'block';
        scanBtn.disabled = false;
        
        // Hide previous results if any
        resultContainer.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    function resetUploader() {
      selectedFile = null;
      fileInput.value = '';
      chartPreview.src = '';
      dropZone.style.display = 'block';
      previewContainer.style.display = 'none';
      scanBtn.disabled = true;
      resultContainer.style.display = 'none';
    }

    // --- API Request logic ---
    async function uploadAndScan() {
      if (!selectedFile) return;

      // Update UI for loading
      scanBtn.disabled = true;
      removeBtn.style.display = 'none'; // prevent removal during scan
      resultContainer.style.display = 'block';
      loadingState.style.display = 'block';
      aiResponse.style.display = 'none';

      const formData = new FormData();
      formData.append("image", selectedFile);

      try {
        // NOTE: Adjust URL if hosted separately from backend
        const response = await fetch('https://divine.pythonanywhere.com/api/v1/scanner', {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();

        loadingState.style.display = 'none';

        if (data.success) {
          analysisText.textContent = data.analysis; // textContent with CSS pre-wrap handles formatting safely
          aiResponse.style.display = 'block';
        } else {
          analysisText.innerHTML = `<span style="color: var(--color-danger)">Error: ${data.error}</span>`;
          aiResponse.style.display = 'block';
        }
      } catch (err) {
        loadingState.style.display = 'none';
        analysisText.innerHTML = `<span style="color: var(--color-danger)">Connection Failed: ${err.message}</span>`;
        aiResponse.style.display = 'block';
      } finally {
        scanBtn.disabled = false;
        removeBtn.style.display = 'flex'; // restore remove button
      }
    }
  </script>
</body>
  </html>
